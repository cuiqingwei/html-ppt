<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT Example Template</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .slide { background-color: #f0f0f0; padding: 50px; margin: 20px; border-radius: 8px; }
        .title { font-size: 2em; color: #333; }
        .content { font-size: 1.2em; color: #666; }
    </style>
</head>
<body>
    <div class="slide">
        <div class="title">Welcome to the HTML PPT Example</div>
        <div class="content">This is a simple example of an HTML PPT template.</div>
    </div>
    <div class="slide">
        <div class="title">Slide 2 Title</div>
        <div class="content">Here is some more content for slide 2. You can add images, charts, etc.</div>
    </div>
    <div class="slide">
        <div class="title">Conclusion</div>
        <div class="content">Thank you for watching! Feel free to customize this template.</div>
    </div>
</body>
</html>
